<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="https://github.com/{{ site.repository }}" rel="noopener">GitHub repository</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>
        Generated from
        <a href="https://github.com/{{ site.repository }}/tree/main/mappings">mappings/</a>
        and
        <a href="https://github.com/{{ site.repository }}/tree/main/mappings-optimized">mappings-optimized/</a>.
      </p>
    </div>
  </footer>
</body>
</html>
