name: Build Advisor Mappings

on:
  issues:
    types: [opened]

concurrency:
  group: build-mappings
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mappings:
    if: contains(github.event.issue.labels.*.name, 'build-mappings')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse upgrade plan from issue
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          WORK_DIR=$(mktemp -d)
          PLAN_TEXT="$WORK_DIR/plan.txt"

          # Check if the issue body contains a file attachment link
          FILE_URL=$(echo "$ISSUE_BODY" \
            | grep -oP 'https://github\.com/[^)"\s]+' \
            | head -1 || true)

          if [[ -n "$FILE_URL" ]]; then
            echo "Downloading attached file from: $FILE_URL"
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              -o "$PLAN_TEXT" \
              "$FILE_URL"
          else
            echo "Using inline issue body as plan text"
            echo "$ISSUE_BODY" > "$PLAN_TEXT"
          fi

          # Extract Maven coordinates (group:artifact) from dependency
          # lines like "	- org.example:artifact-name"
          COORDS_FILE="$WORK_DIR/coordinates.txt"
          grep -oP \
            '^\s*-\s+\K[A-Za-z0-9][A-Za-z0-9._-]*:[A-Za-z0-9][A-Za-z0-9._-]*' \
            "$PLAN_TEXT" \
            | sort -u \
            > "$COORDS_FILE" || true

          COUNT=$(wc -l < "$COORDS_FILE" | tr -d ' ')
          if [[ "$COUNT" -eq 0 ]]; then
            echo "::error::No Maven coordinates found in the upgrade plan output"
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "coordinates_file=$COORDS_FILE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found $COUNT unique coordinates:"
          cat "$COORDS_FILE"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "coordinates_file=$COORDS_FILE" >> "$GITHUB_OUTPUT"

      - name: Comment on issue if no coordinates found
        if: steps.parse.outputs.found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ **No Maven coordinates found in the upgrade plan output.**\n\nPlease ensure the issue body contains the output of \`advisor upgrade-plan get\` with dependency entries in the format:\n\`\`\`\n\t- group.id:artifact-id\n\`\`\`\n\nYou can either paste the output directly or attach a \`.txt\` file.`
            });

      - name: Fail if no coordinates found
        if: steps.parse.outputs.found == 'false'
        run: exit 1

      - name: Download and install Advisor CLI
        env:
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          ADVISOR_VERSION: ${{ vars.ADVISOR_VERSION }}
        run: |
          set -euo pipefail

          echo "Downloading advisor CLI version ${ADVISOR_VERSION}..."
          curl -fsSL \
            -H "Authorization: Bearer ${ARTIFACTORY_TOKEN}" \
            -o advisor-cli.tar \
            "https://packages.broadcom.com/artifactory/spring-enterprise/com/vmware/tanzu/spring/application-advisor-cli-linux/${ADVISOR_VERSION}/application-advisor-cli-linux-${ADVISOR_VERSION}.tar"

          tar -xf advisor-cli.tar --strip-components=1 --exclude=META-INF
          chmod +x advisor
          sudo mv advisor /usr/local/bin/
          rm -f advisor-cli.tar

          echo "Advisor CLI installed:"
          advisor --version || echo "advisor CLI ready"

      - name: Generate mapping files
        id: generate
        env:
          COORDS_FILE: ${{ steps.parse.outputs.coordinates_file }}
        run: |
          set -euo pipefail

          mkdir -p mappings

          # Create a timestamp file to identify newly generated files
          TIMESTAMP_REF=$(mktemp)

          SUCCESSES_FILE=$(mktemp)
          FAILURES_FILE=$(mktemp)

          while IFS= read -r coord; do
            [[ -z "$coord" ]] && continue

            echo "============================================"
            echo "Generating mapping for $coord"
            echo "============================================"

            if advisor mapping create -c="$coord" < /dev/null; then
              echo "✅ Successfully generated mapping for $coord"
              echo "- ${coord}" >> "$SUCCESSES_FILE"
            else
              echo "⚠️ Failed to generate mapping for $coord"
              echo "- ${coord}" >> "$FAILURES_FILE"
            fi

            # Derive filename from the fully qualified coordinate (replace : with _)
            COORD_FILENAME="${coord//:/_}"

            # Find any newly generated mapping file
            # The CLI may output to the current directory or .advisor/
            NEW_FILE=$(find . -maxdepth 3 -name '*.json' \
              -not -path './mappings/*' \
              -not -path './.git/*' \
              -newer "$TIMESTAMP_REF" \
              -print -quit 2>/dev/null || true)

            if [[ -n "$NEW_FILE" ]]; then
              # Extract the slug from the generated JSON
              SLUG=$(jq -r '.slug // empty' "$NEW_FILE" 2>/dev/null || true)

              # Check if the slug already exists in another mapping file
              if [[ -n "$SLUG" ]]; then
                EXISTING=$(find mappings -name '*.json' \
                  -exec jq -r --arg s "$SLUG" 'select(.slug == $s) | .slug' {} \; \
                  2>/dev/null | head -1 || true)

                if [[ -n "$EXISTING" ]]; then
                  # Slug conflict: derive a unique slug from the artifact name
                  ARTIFACT=$(echo "$coord" | cut -d: -f2)
                  echo "⚠️ Slug '$SLUG' already exists, using '$ARTIFACT' instead"
                  jq --arg s "$ARTIFACT" '.slug = $s' "$NEW_FILE" > "${NEW_FILE}.tmp" \
                    && mv "${NEW_FILE}.tmp" "$NEW_FILE"
                fi
              fi

              mv "$NEW_FILE" "mappings/${COORD_FILENAME}.json"

              # Clean up any other newly generated files from this iteration
              find . -maxdepth 3 -name '*.json' \
                -not -path './mappings/*' \
                -not -path './.git/*' \
                -newer "$TIMESTAMP_REF" \
                -exec rm -f {} \; 2>/dev/null || true
            fi

            # Update the timestamp reference for the next iteration
            touch "$TIMESTAMP_REF"

          done < "$COORDS_FILE"

          rm -f "$TIMESTAMP_REF"

          {
            echo "successes<<EOF"
            cat "$SUCCESSES_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "failures<<EOF"
            cat "$FAILURES_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          HAS_FAILURES="false"
          if [[ -s "$FAILURES_FILE" ]]; then
            HAS_FAILURES="true"
          fi
          echo "has_failures=$HAS_FAILURES" >> "$GITHUB_OUTPUT"

          rm -f "$SUCCESSES_FILE" "$FAILURES_FILE"

          # Check if any mappings were generated
          MAPPING_COUNT=$(find mappings -name '*.json' | wc -l)
          echo "mapping_count=$MAPPING_COUNT" >> "$GITHUB_OUTPUT"

      - name: Trim versions to latest per major
        if: steps.generate.outputs.mapping_count != '0'
        run: |
          set -euo pipefail

          # Create jq filter to keep only the latest minor version per major version.
          # Exception: if only 0.x versions exist, keep the last 5.
          cat > /tmp/trim_versions.jq << 'JQEOF'
          def parse_version:
            split(".") | {major: (.[0] | tonumber), minor: (.[1] | tonumber), key: (join("."))};
          def sort_versions:
            sort_by([.major, .minor]);
          .rewrite as $rewrite |
          ($rewrite | keys | map(parse_version) | sort_versions) as $all_versions |
          (
            if ($all_versions | all(.major == 0)) then
              $all_versions | .[-5:]
            else
              $all_versions | group_by(.major) | map(last)
            end
          ) as $keep_versions |
          ($keep_versions | length) as $count |
          (reduce range($count) as $i (
            {};
            ($keep_versions[$i]) as $ver |
            (if $i < ($count - 1) then
              {version: $keep_versions[$i + 1].key, project: (if $rewrite[$ver.key].nextRewrite then $rewrite[$ver.key].nextRewrite.project else null end)}
            else
              $rewrite[$ver.key].nextRewrite
            end) as $next |
            . + {
              ($ver.key): ($rewrite[$ver.key] | .nextRewrite = $next)
            }
          )) as $new_rewrite |
          .rewrite = $new_rewrite
          JQEOF

          echo "Trimming versions in mapping files..."
          for f in mappings/*.json; do
            BEFORE=$(jq '.rewrite | keys | length' "$f")
            jq --indent 2 -f /tmp/trim_versions.jq "$f" > "${f}.tmp" && mv "${f}.tmp" "$f"
            AFTER=$(jq '.rewrite | keys | length' "$f")
            if [[ "$BEFORE" != "$AFTER" ]]; then
              echo "  $f: $BEFORE → $AFTER versions"
            fi
          done
          echo "✅ Version trimming complete"

      - name: Validate no duplicate slugs
        if: steps.generate.outputs.mapping_count != '0'
        run: |
          set -euo pipefail

          echo "Checking for duplicate slugs in mappings/..."

          # Collect all non-empty slugs
          DUPES=$(find mappings -name '*.json' -exec jq -r '.slug // empty' {} \; \
            | grep -v '^$' \
            | sort \
            | uniq -d)

          if [[ -n "$DUPES" ]]; then
            echo "::error::Duplicate slugs found in mappings/:"
            echo "$DUPES"
            echo ""
            echo "Files with duplicate slugs:"
            for slug in $DUPES; do
              for f in mappings/*.json; do
                if jq -e --arg s "$slug" '.slug == $s' "$f" > /dev/null 2>&1; then
                  echo "  $f"
                fi
              done
            done
            exit 1
          fi

          echo "✅ No duplicate slugs found"

      - name: Commit and push mapping files
        if: steps.generate.outputs.mapping_count != '0'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add mappings/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add advisor mappings from issue #${{ github.event.issue.number }}"
            git push origin main
          fi

      - name: Comment results on issue
        if: always() && steps.parse.outputs.found == 'true'
        uses: actions/github-script@v7
        env:
          SUCCESSES: ${{ steps.generate.outputs.successes }}
          FAILURES: ${{ steps.generate.outputs.failures }}
          MAPPING_COUNT: ${{ steps.generate.outputs.mapping_count }}
        with:
          script: |
            const successes = (process.env.SUCCESSES || '').trim();
            const failures = (process.env.FAILURES || '').trim();
            const mappingCount = process.env.MAPPING_COUNT || '0';

            let body = `## Mapping Generation Results\n\n`;

            if (successes) {
              body += `### ✅ Successfully generated\n${successes}\n\n`;
            }

            if (failures) {
              body += `### ⚠️ Failed to generate\n${failures}\n\n`;
            }

            if (mappingCount !== '0') {
              body += `\n📦 **${mappingCount}** mapping file(s) committed to \`main\` branch in the \`mappings/\` directory.`;
            } else {
              body += `\n⚠️ No new mapping files were generated.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Close issue on success
        if: steps.generate.outputs.mapping_count != '0' && steps.generate.outputs.has_failures == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });
