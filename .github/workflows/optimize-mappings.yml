name: Optimize Advisor Mappings

on:
  workflow_dispatch:

concurrency:
  group: optimize-mappings
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  optimize-mappings:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build optimized mappings
        run: python3 scripts/optimize-mappings.py

      - name: Commit and push optimized mappings
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mappings-optimized
          if git diff --cached --quiet; then
            echo "No changes to mappings-optimized/"
            exit 0
          fi
          git commit -m "Rebuild mappings-optimized/ from mappings/"
          git push
